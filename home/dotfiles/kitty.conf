# Kitty configuration
# Ported from termite config

# Font
font_family Inconsolata
font_size 13

# Scrollback
scrollback_lines 100000

# Cursor
cursor_blink_interval 0

# Bold is not bright (matches termite bold_is_bright = false)
bold_is_bright no

# Disable all default key mappings, then re-enable font size controls
clear_all_shortcuts yes

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

# Selection highlight
selection_foreground #002b36
selection_background #586e75

# Solarized Dark color scheme

foreground #839496
background #002b36
cursor     #93a1a1

# Black
color0  #073642
color8  #657b83

# Red
color1  #dc322f
color9  #cb4b16

# Green
color2  #859900
color10 #586e75

# Yellow
color3  #b58900
color11 #657b83

# Blue
color4  #268bd2
color12 #839496

# Magenta
color5  #d33682
color13 #6c71c4

# Cyan
color6  #2aa198
color14 #93a1a1

# White
color7  #eee8d5
color15 #fdf6e3

# vim: ft=conf
