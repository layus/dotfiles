# Alacritty configuration
# Ported from previous terminal config

[font]
size = 13.0

[font.normal]
family = "Inconsolata"

[scrolling]
history = 100000

[bell]
duration = 0

[cursor]
blink_interval = 0

[colors]
draw_bold_text_with_bright_colors = false

[colors.primary]
foreground = "#839496"
background = "#002b36"

[colors.cursor]
text = "#002b36"
cursor = "#93a1a1"

[colors.selection]
text = "#002b36"
background = "#586e75"

[colors.normal]
black = "#073642"
red = "#dc322f"
green = "#859900"
yellow = "#b58900"
blue = "#268bd2"
magenta = "#d33682"
cyan = "#2aa198"
white = "#eee8d5"

[colors.bright]
black = "#657b83"
red = "#cb4b16"
green = "#586e75"
yellow = "#657b83"
blue = "#839496"
magenta = "#6c71c4"
cyan = "#93a1a1"
white = "#fdf6e3"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "Equals"
mods = "Control|Shift"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control|Shift"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Back"
mods = "Control|Shift"
action = "ResetFontSize"
